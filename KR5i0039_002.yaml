front:
  text: 入藥鏡重刋道藏輯要
  hash: sha256:2133c16a58ee5d355b0d84ce2dc2ef51061ac091f837dac4ed478797bd2cf13e
  markers:
  - {type: page-break, offset: 3, content: '', id: CK-KZ_KR5i0039_02p001a}
body:
  text: 入藥鏡至一真人崔希範著混然子王道淵注解滄溟李攀龍注釋一壑居士彭好古注解滄溟詩曰先天一氣金丹祖虛無久是先天母一氣産時生陰陽汞是龍兮鉛是虎聚之一氣為元精散則金木水火土若知萬物憑虛生始信陰陽無定所先天氣後天氣得之者常似醉混然子曰先天氣者乃元始祖氣也此祖氣在人身天地之正中生門密戶懸中高處天心是也神仙修鍊止是採取先天一氣以為丹母後天氣者乃一呼一吸一往一來內運之氣也呼則接天根吸則接地軸呼則龍吟雲起吸則虎嘯風生綿綿若存歸於祖氣內外混合結成還丹自覺丹田火熾暢於四肢如癡如醉美在其中此所以得之者常似醉也道德經云谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤易坤卦云黃中通理正位居體美在其中而暢於四肢如斯之謂也一壑居士曰人之未生混混沌沌惟臍中一點真氣與母命蒂相通母呼亦呼母吸亦吸及㘞的一聲而氣落丹田矣呼接天根吸接地軸而先天元始祖氣未嘗不充溢於其中非後天之氣無以見先天一氣之流行非先天之氣無以為後天一氣之主宰此氣在人身天地之中生門密戶藏則為氣形則為氣崔公入藥鏡以氣為藥故首欲人得此氣然果何由而得哉先天之學自虛化氣後天之學以神馭氣先天之氣採之先庚後天之氣採之後甲一得此氣二六時中如雞抱卵如龍養珠綿綿若存勿忘勿助自覺丹田火暖美在其中暢於四肢而如癡如醉矣學道者甚哉不可不講於得之理也滄溟先天氣後天氣詩曰先天一氣即真鉛産在虛無太極前恍惚窈冥中有象方知造化極玄玄後天之氣為真汞本與先天一竅生但得汞鉛歸一處自然頃刻産真精注曰此言大藥物真鉛汞也先天一氣無極也無中有也後天之氣太極也有中無也即此便是金丹大藥真鉛真汞之祖父母未生以前即有先天之氣既生之後後天之氣即與先天之氣混合而為一也太上教人採取先天靈父聖母之氣合而鍊為大藥無中生有返本還源即與先天之氣混合為一也此外更無覓真鉛真汞處也鉛汞歸一竅之中修鍊成九轉之藥金液還丹之妙盡在其中矣先後二字必有次第悟者自得之矣得之者常似醉詩曰金丹大道極玄微學者紛紛達者誰一得須知為永得便宜下手立根基昏昏默默太虛中有有無無妙莫窮方寸壺中傾不盡自家無日不春風注曰此言得藥之後景象也大道易成至人難遇既遇至人則一得永得矣既已得之苟不下手植立根基是為自棄大道矣金液還丹既吞入腹點化凡軀以成真人便有自然景象參同契云淫淫若春澤液液象解氷從頭流達足究竟復上升往來洞無極怫怫被谷中顏色浸以潤骨節益堅強是皆美在其中而晬於面盎於背暢於四肢達於四體四體不言而喻是皆自然效證也日有合月有合窮戊已定庚甲混然子曰日月者太陽太陰也天有黃道為度三百六十五度四分度之一其運轉也一日一周日月行乎其間往來上下迭為出入此所以分晝夜而定寒暑也當冬至之節一陽生於復日從北行月從南行夏至之節一陰生於姤日從南行月從北行日行一日一度至三十度與太陰會月本無光借日之光月行一日十二度有零至三十日行滿周天之度每月晦朔與太陽同會所行之宫日月合璧晦象年終朔象歲首會而復離離而復會月因日以受其明陽魂漸長陰魄漸消至初八日夜陽半陰半為上弦至十五日夜與日對照為望故圓圓滿之極其理當虧於是陰魄漸長陽魂漸消至二十三日夜陰半陽半為下弦至三十日夜為晦又復與日同會此天之曰有合月有合也及求於身吾身一天地亦有日月也以身為乾坤以坎離為藥物以日月運行為火候行之吾身與天地日月無不同也當作丹之時運日月之雙輪簇陰陽於一息日月歸鼎陰陽媾精烹之鍊之結成聖胎此吾身曰有合月有合也了真子曰玉池常滴陰陽髓金鼎時烹日月精是也既明日月之合必窮戊已之源戊已者中央土也水火分為上下木金列於東西木為火母金為水母若非戊已之功水火不能既濟金木不得歸併當施化之際是用戊土從坎起進之以陽火已土從離降退之以陰符攝回四象而同爐此戊已之功也既窮戊已之理必定庚甲之方庚西方金也情也虎也甲東方木也性也龍也言人之情好於馳騁見物即逐如虎猖狂故每傷於性性被情迷不能為主如龍奔騰故二物間隔大修行人制之不難遇此時正好下手施功須仗黃婆媒合旋斗柄之機一息之間即得金木歸併情性合一龍虎入鼎心虛湛然此所以定庚甲也丹家妙用宜乎生甲生庚學者不可不知也滄溟曰有合月有合詩曰日魂陽髓出東方為吸陰精酉位藏金水兩平逢二八自然合璧有重光月魄陰精照兖川為含陽髓即東旋後弦前共前弦後一月相交一次圓注曰此言大丹藥物法象之妙用也日月為金丹之功用大矣日出東方月出酉位月自初三日生魄與太陽之光相近日近一日故近日光而生光至於初八日上弦恰受太陽之光一半明月至此上弦平如繩而上弦金半斤也自初八日以後直至十五日則受盡太陽之光與日相望則月魄光明圓滿照於東方至此則日月對照也至十六日以後月與太陽相遠日遠一日故退日魂而無光至於二十三日下弦恰退太陽之光一半明月至此下弦平如繩而下弦水半斤也自二十三日以後直至二十九日則退盡太陽之光與日不相見則月魄晦而光滅乃東北喪朋之時也至初三日則復如初而一月一合璧也故藥物則而象之修鍊大丹不過按日月盈虧之象則陰陽消長之機苟能悟此則藥物在此矣冬至在此矣下手在此矣採取在此矣火候在此矣抽添在此矣沐浴在此矣凝結在此矣玄哉妙哉必須口授非楮筆之所敢泄也天譴可不畏乎窮戊已定庚甲詩曰戊為真土中宫數癸是天元真一精窮取兩般能制伏丹基從此可經營甲為卯位青龍木庚是西方白虎金能使虎龍歸一處黃芽白雪不難尋注曰金丹之道全仗五行四象八卦相資以成也甲乃青龍之木庚乃白虎之金蓋金木常有間隔之患戊為真土中宫之數癸乃天元真一之水乃大丹之基也還丹之本莫大乎金水金水必藉戊土以相制伏然後丹道立矣故定庚甲則知金木有混融之妙窮戊已則知水土有制伏之功造化玄微天機深遠誰敢輕議窮定二字乃在我之機也上鵲橋下鵲橋天應星地應潮混然子曰人身夾脊比天之銀河也銀河阻隔而有靈鵲作橋故有鵲橋之説人之舌亦言鵲橋也凡作丹之時以黃婆引嬰兒上升泥丸與姹女交會名曰上鵲橋也黃婆復徘徊笑引嬰兒姹女同歸洞房必從泥丸而降故曰下鵲橋也黃婆嬰兒姹女非真有也乃譬喻之説無出乎身心意三者而已默運之功內仗天罡斡運外用斗枘推遷起火之時覺真氣騰騰上升如潮水之初起直上逆流故曰天應星地應潮也丹經云功夫容易藥非遙撥動天輪地應潮是也滄溟上鵲橋下鵲橋詩曰高篤虛空峻接天金烏玉兔自盤旋分明橫駕秋江曲只在平分上下弦真土根基疊砌成蟾光到處水金平只教嬰姹常來往此外誰堪向上行注曰上鵲橋指上弦而言也下鵲橋指下弦而言也即此二弦共合金水二八之數蓋上鵲橋之下下鵲橋之上其中乃金水混融之地也前弦之後後弦之前其中乃金水氣旺之時也金丹之妙不過合二八兩弦金水之氣而成故有上下前後之别嬰兒居甲乙之鄉姹女處庚辛之地北限壬癸之水南隔丙丁之火兩情相慕瞻望弗及如牛女阻隔天河也若欲聚會必假橋梁以濟往來故牛女相會必假鵲橋而吕祖有云曲江上見月華瑩淨有箇烏飛亦是喻上下兩弦月如鵲橋之形象也既得聚會則兩情相戀結為夫婦變化玄珠成象矣或者指鵲橋之中為玄關一竅亦是一説上下兩弦原出於此也天應星地應潮詩曰天上三奇日月星斗樞晝夜運天經毫釐進退無差忒正應金丹火候靈中秋月魄十分圓金旺潮洪出海門內外與潮相應處自家真氣正朝元注曰此言修鍊大丹造化之妙上稽天文則應乎星辰下察地理則應乎潮候天罡一曜隨月建以指方斗樞一星逐時辰而轉位如亥時則指西北子時則在正北四七二十八宿環列於天河之上三百六十五度經行於分野之中流轉無窮周而復始故能成陰陽界寒暑定四時而成歲功也海潮一日兩次往回隨日月之出沒定子午之消長自初三日月生為始起水日盛一日至月半則極其盛大至十六日月缺為下岸曰減一日至月晦則極其小矣毫釐不差時刻不易故曰潮信也此言人之一身元氣周流往來上下與天星海潮同一造化修鍊金丹進退符火苟能法天星之轉動體海潮之消長不差不忒則金液還丹立可成矣元樞歌云地下海潮天上月至哉言乎而盧山皇甫真人觀潮一詞尤為看破天地造化端的併録於此以為證據百字令云鑿開混沌見錢塘南空長江銀璧今古詞人吟此景誰解推原端的歲去年來日庚月甲因甚無差忒而今説破要知天地來厯道散有一強名五行顚倒互列乾坤厯坎水逆流朝丙戶隨月盈虧消息氣到中秋金能生水倍湧千重雪神仙妙用與潮無箇分别起巽風運坤火入黃房成至寶混然子曰作丹之法乃鍊吾身真鉛真汞也鉛遇癸生之時便當鼓動巽風搧開爐鞲運動坤宫之火沈潛於下抽出坎中之陽去補離中之陰成乾之象復歸坤位而止片餉之間發火煆鍊鉛清汞潔結成空器金胎厯劫不壞此所以入黃房成至寶也度人經云中理五氣混合百神十轉回靈萬氣齊仙蕭廷芝云大藥三般精氣神天然子母互相親回風混合歸真體煆鍊功夫日日新是也滄溟起巽風運坤火詩曰採得真鉛入鼎中更須烹鍊虎和龍玄關欲運坤宫火槖籥須憑巽位風西南真土是坤宫大藥根源産在中運用自然文武火一時凝結聖胎紅注曰東南為巽西南為坤巽屬木則能生風坤屬土故有真火然火無風則不能自運必須假巽風以吹噓之蓋東南與西南對其為吹噓易矣鍾離祖師云鍊藥憑巽風而杏林亦曰吹噓藉巽風杏林之説其雲房之意與入黃房成至寶詩曰天然真土是黃房採得真鉛此內藏固濟更須行火候鍊成一塊紫金霜真汞真鉛鍊得成黍珠一粒重如金此般至寶身中有莫把旁門向外尋注曰黃房神室也金鼎也玉爐也玄關也玄牝也真土也鄞鄂也總而言之修鍊金液還丹之鼎器也既能採取先天鉛汞之藥入黃房之中起以巽風運以坤火依凖符候鍊成至寶大如黍米既得此丹可以長生久視返老還童點化凡軀遠遊輕舉豈非天地至寶乎黃房神室須要認得端的分曉方可下手修鍊或者鑄金刻玉皆非自然安能氣類相感哉而龍虎上經論至鼎器則有磁石吸鐵隔礙潛通之説可以默會於胸中矣須要認得造化生成之巧切不可以人為而得之此竅無內無外大包天地細無不納蓋不可執於內有亦不可必於外無也識造化者必於真土中求其根蒂焉得此則丹道立矣以真土之色黃故曰黃房有曲密深邃之義也水怕乾火怕寒差毫髮不成丹混然子曰修真內鍊之要鼎中之水不可乾爐內之火不可寒丹經所謂金鼎常留湯火暖玉爐不要火教寒是也以外丹言之凡作丹之時行武鍊文烹之功大要調和火力若用之太過則火燥水乾不及則水濫火寒務在行之停勻一刻周天水火既濟鼎內丹結自然而然也若差之毫髮不成丹矣仙師云藥有老嫩火有斤兩學者不可不知了真子有云七返九還須識主功夫毫髮不容差悟真篇云大都全藉修持力毫髮差殊不作丹是也滄溟水怕乾火怕寒詩曰坎內天元真一精須知丹向此中成常教融液無枯涸佇看黃芽旋旋生汞鉛無火不成丹要識抽添造化難鼎內溫溫常著意莫教焰滅與灰殘注曰此乃造化自然之理也修丹之要實在水火水性潤下故怕乾火性炎上故怕寒須要調停無令有枯涸灰殘之患自然既濟升降而成功矣水火之用其大矣哉差毫髮不成丹詩曰毫髮差殊鍊不成怎教龍虎媾真精龜飛蛇舞乖張盛欲覓長生返害生鉛飛汞走不相投火自炎空水自流不得一珠成黍米更於何處結丹頭注曰採取藥材調停水火全在功夫凖繩造化差之毫釐謬以千里反掌有鉛飛汞走之患撚指有虎鬬龍爭之險嬰兒遠去姹女逃亡欲要返還霄壤殊絶故契云飛龜舞蛇愈見乖張不知何處可以結丹頭也修鍊之士其可忽諸鉛龍升汞虎降驅二物勿縱放混然子曰鉛者坎中一點真陽謂之龍也汞者離中一點真陰謂之虎也凡作丹之時飛戊土抽坎中之鉛木生火而炎上升泥丸龍從火裏出故曰鉛龍升也用已土攝離中之汞金生水而流下降丹田虎向水中生故曰汞虎降也擒捉之功非加武火之力則鉛龍不升非用文火之力則汞虎不降一息周流妙在堅剛著力擒龍虎入鼎烹鍊化為玉漿故曰驅二物勿縱放也張紫陽云西山白虎正猖狂東海青龍不可當兩手捉來令死鬬化成一塊紫金霜是也一壑居士曰鉛本沈重而下墜為白虎因坎宫真一之精原自乾宫泄來鉛因得汞發舉真一之水而上騰故曰鉛龍升汞本飛揚而上騰為青龍因離宫正陽之氣原自坤宫換去汞因得鉛變化純陽之氣而下墜故曰汞虎降西山之虎猖狂難擒東海之龍獰惡難制惟驅龍就虎驅虎降龍二物和合勿使縱放則龍虎兩弦之氣同歸一穴而成丹滄溟鉛龍升汞虎降詩曰鉛象如龍法最靈窈冥恍惚本無形要知採取無中有只是先天氣上升汞本西方白虎精與龍相會便交併壺中景象般般有升降陰陽自凖繩注曰鉛先天也其升如龍汞後天也其降如虎龍升虎降相遇於中宫須臾作吟嘯之聲頃刻有交媾之象龍吞虎髓虎啖龍精故能於恍惚窈冥之中産成玄珠之寶古歌曰五行不順行虎向水中生五行顚倒術龍從火裏出此乃是造化至妙之機修鍊之士必先洞明此理則金液自然返還矣驅二物勿縱放詩曰二物無非汞與鉛一時採取向先天擒來手內明生殺虎伏龍降軟似綿擒得來時要謹持莫教容易落危機龍獰虎惡牢拴繫鉛汞同爐永不飛注曰此按上文言也當其龍虎升降交媾之時便當依時採取以為藥物二物即鉛汞也既擒入手龍虎其可以縱放哉然後閃入黃房之中牢加拘繫密以隄防使之相吞相啖於玄關之中而自然降伏故紫陽云西山白虎正猖狂東海青龍不可當兩手捉來令死鬬化成一塊紫金霜又云既驅二物歸黃道爭得金丹不解生正謂此爾産在坤種在乾但至誠法自然混然子曰張紫陽云要知産藥川源處只在西南是本鄉此所以言吾身西南乃坤位也人腹為坤人首為乾坤居下為爐乾居上為鼎金丹大藥産在坤種在乾凡作丹採藥之時必從坤位發端沈潛尾穴溫養見龍當加武火逼逐真陽之氣逆上乾宫交媾復還坤位而止猛烹極煅結成至寶故曰産在坤種在乾其中復有先天産藥之時觀心吸神握定不泄皆助火候之力古仙往往祕而不言此最上機關人誰知之行持之間或在存誠野戰防危法天象地應化自然故曰但至誠法自然也一壑居士曰金液大丹本是先天乾金而先天坤土又生乾金及乾體破而為離坤體遂實而為坎坎中一點先天真一之氣雖居北方而産水之源則在西南之坤方故曰産在坤取坎中之一補離中之二復還乾體即為金丹故曰種在乾但至誠無息一升一降法天地之自然一往一復法日月之自然而丹結矣滄溟産在坤種在乾詩曰藥産西南正在坤一輪明月照崑崙金精壯盛時須採烏兔從教自吐吞大藥金丹本不難全憑鉛汞入玄關分明採取坤家種種向乾宫結大還注曰坤位西南乾居西北此乾坤對立生成之象也藥物産於坤宫真土之鄉而坤乃水土長生之地以坤宫真水種向乾家老金之宫而金乃水母而金又能生水金水相生而成藥祖也夫乾陽也父也天也坤陰也母也地也吾身未生以前而乾父一點先天之氣已産於坤母腹內既生之後又與我同生於一身之中即是寄種乾宫矣吾身即乾父也但能於身求母腹內元得一點先天之氣復種於吾身交感之宫此乃返本還源之妙道也紫陽云依他坤位生成體種向乾家交感宫其造化深矣玄妙矣但至誠法自然詩曰萬般作用謾施功總與金丹事不同但要至誠無間斷自然大道在其中大道虛無法自然自然之外更無玄致柔專氣嬰兒樣飢即求飱困即𦕛注曰大藥還丹非天下至誠者其孰能與於此哉道本無為有為則非道矣此喻修丹之士在主乎一至誠不息而行但取法自然之造化而巳且日月之盈虧寒暑之來往星辰之轉運是孰使之然哉此乃自然之造化耳學者體此則大道自然成矣盜天地奪造化攢五行會八卦混然子曰提挈天地握定陰陽攢簇五行會合八卦此神仙之學也天地者即乾坤也造化者即陰陽也五行者金木水火土也八卦者乾坤坎離震巽艮兌是也且夫天地之大造化之深五行分布八卦環列以何術能盜之奪之攢之會之盜者竊也奪者取也攢者簇也會者合也此言丹家之法妙在口傅凡作丹真訣只在些兒消息待時至氣化藥産神知便當閉風關塞兌戶斡天罡旋斗柄運符火之一息簇三千六百之正氣回七十二候之要津顚倒五行會合八卦總歸土釜牢固封閉須臾調燮火發武鍊文烹結成聖胎所以一刻功夫奪一年之節候丹經云人心若與天心合顚倒陰陽只片時此即一呼一吸能奪造化人一日有一萬三千五百呼一萬三千五百吸一呼一吸為一息則一息之間潛奪天運一萬三千五百年之數一年三百六十日四百八十六萬息潛奪天運四百八十六萬年之數於是換盡陰濁之軀變成純陽之體神化自在聚則成形散則成風出有入無隱顯莫測豈不奇哉一壑居士曰凡作丹要訣只在些兒消息大修行人入室下功閉風關塞兌戶斡天罡旋斗柄猛烹極鍊結成聖胎則一息之火符盜天地一萬三千六百之正氣一時之功夫奪造化一年七十二候之要津陰陽變合為五行攢金木水火於戊已二土之內坎離周流於六卦會震兌巽艮於乾坤相括之中而天地造化五行八卦合而為一矣滄溟盜天地奪造化詩曰竊取乾坤日月精鍊成大藥片時靈其機神鬼難窺測妙在陰符一卷經時中有刻最玄玄一刻功夫應一年奪得真鉛歸掌握方知我命不由天注曰黃帝陰符經云天地萬物之盜萬物人之盜人萬物之盜又曰其盜機也天下莫能知君子得之固窮小人得之輕命而崔公乃曰盜天地奪造化何哉蓋人為萬物之靈故能若是也夫修鍊金丹全藉天地造化以成其功採日月之精華法乾坤之爐鼎按周天之星象行卦氣之符火凖日月之弦望隔陰陽之子午故能年中取月月中取日日中取時時中取刻蹙一年造化於一日之內乃於一刻之內行一年之功盜天地奪造化孰有大於此者神聖哉玄妙哉攢五行會八卦詩曰青龍白虎定東西北坎南離造化齊水火木金並四象共歸真土屬刀圭先把乾坤作鼎爐坎離藥物定錙銖更將震兌分龍虎艮巽剛柔合火符注曰攢簇五行會合八卦此大藥之法象也五行以土德為宗八卦以乾坤為祖東木西金南火北水皆藉中宫之土以成其用坎離藥物震兌龍虎艮巽火符皆會於乾坤一鼎之內此造化歸中之妙也而紫陽云東三南二同成五北一西方四共之戊已自居生數五三家相見結嬰兒知此則攢簇五行會合八卦之理明矣水真水火真火水火交永不老混然子曰水居北方在卦為坎在身為腎火居南方在卦為離在身為心水中藏火火中藏水人心中一點真液乃真水也腎中一點真陽乃真火也水火分於上下何由而交乎必假戊己真土擒制逼逐得其真火上升真水下降同歸土釜水火既濟結成金丹一氣純陽與天齊夀故曰水火交永不老也滄溟水真水火真火詩曰乾坤真水不離身遠在先天著意尋採得來時元不遠分明坎內一爻金真火無根本自如初非鑽木費吹噓陰符陽火皆由此坎內陽爻是復初注曰坎水也離火也皆非真水也非真火也坎中藏一畫之陽離中藏一畫之陰坎水之陽真火也離火之陰真水也斯為真火真水之源初非鑽木而求方諸而取者紫陽云取將坎位中心實點化離宫腹內陰從此變成乾健體潛藏飛躍盡由心水火之妙皆是陽中陰陰中陽也水火交永不老詩曰水升火降入黃庭交媾真精結窈冥若遇玄珠如黍米龜蛇自是合其形水火端然合聖機刀圭入腹夀無期縱教滄海桑田變自在壺中總不知注曰火性炎上水性潤下天地造化生成不易之理也今坎中之水𨚫在上而離中之火𨚫在下此乃顚倒陰陽之妙也水升火降自然交合蓋陰氣上升而為水陽氣下降而為火故能交媾二氣而鍊鉛汞之丹譬之地氣上升而為霧天氣下降而為露故能滋生萬物而成造化之功太上曰天地交合以降甘露驗之人身水火周流於一已之內得其交媾則龜蛇合形神氣歸穴返老還童與天地同其長久莊子所謂長生上古而不老者是也水能流火能焰在身中自可驗混然子曰水在上故能流潤於下火在下故能炎焰於上此天地水火升降自然之理人身作丹運用之時亦復如是故曰在身中自可驗也一壑居士曰水在上能流而潤下火在下能焰而炎上此天地水火升降自然之理金丹之道水本下而壬水上行反在於上故能流火本上而丙火下行反在於下故能焰其流其焰在身中自可驗也滄溟水能流火能焰詩曰水性能流北坎鄉隄防失節致懷襄能求真土相擒制滋養元芽漸漸長南離真火妙無形真水相須道乃成制伏若無顚倒術汞鉛燒竭煮空鐺注曰水流火焰自然性也水無土而制之則濫火無水而制之則燥使之無太過不及之患則在修鍊之士調停爾而易曰水流濕火就燥雲從龍風從虎本乎天者親上本乎地者親下亦各從其類也能知水火相須相濟之妙則金液還丹之道備矣崔公至此重疊發明水火之祕蓋欲使學者深切究竟其根源也在身中自可驗詩曰水火周流在一身若於外假總非真𨚫如貪愛他人寶不識吾家無價珍人身各有一坤乾動靜無非合自然毫髮不差還可驗不須天外更求天注曰此承上文言也真水真火不離一身之中初非外而求之苟不洞明其源則將有錯認之患夫人一身自有天地耳目之視聽手足之運行血脈之往來真氣之升降語默之動靜無非真水真火之妙用存焉驗之一身盡在其中矣是性命非神氣水鄉鉛只一味混然子曰性即神也命即氣也性命混合乃先天之體也神氣運化乃後天之用也故曰是性命非神氣也修鍊之士欲得其性靈命固從下手之初必採水鄉鉛水鄉鉛者坤因乾破而為坎坎水中有乾金金為水母母隱子胎一點真陽居於此處遇身中子時陽動之際急急採之紫陽所謂鉛遇癸生須急採採時須以徘徊之意引火逼金正所謂火逼金行顚倒轉自然鼎內大丹凝只此一味為大道之根雲房云生我之門死我戶幾箇醒醒幾箇悟夜來鐵漢細尋思長生不死由人做指此一味直欲世人於此尋之方是鍊丹之本丹經云好把真鉛著意尋華池一味水中金是也一壑居士曰性即神命即氣性中之神在天為電光在地為水光在日為陽光在月為金光在人為神光此神光乃先天乾金之光無極之始鴻濛未判混混沌沌止知其為乾及動而生陽靜而生陰始知其為乾又知其為坤乾坤交媾之後破乾為離破坤為坎而先天之乾走入坎中坎中之一原自乾中泄來真種子在天者成性在地者立命遂有性命之分故金花真種子是性亦是命何者為神何者為氣若不能見此坎中真一之命必不能見此離中本來之性乾金即水中金金即鉛鉛即水可見能留得性命只是水鄉鉛一味而已雲房丹訣云鉛鉛水鄉靈源庚辛室位屬乾嘗居坎戶隱在兌邊生天生地生人生萬物皆不能外此先天之鉛修金丹者豈可外此先天之鉛而立性命哉今人不知性命一原之理執定修性一邊自謂明心見性不知非金丹之道性先離幻軀而逝矣將何由而得見乎滄溟是性命非神氣詩曰性命初非是兩門當知性命互為根若能修命兼修性方合金丹大道真真鉛真汞採先天妙用分明在目前神氣若將為藥物蟾光何事照西川注曰性火也命水也性命水火之本源也或者以氣為水以神為火似是而實非也當知性命之理雖曰兩途其實本同一處命無性則何以生性無命則何以立須要性命雙修打成一片則混合而為一物性命即鉛汞鉛汞即性命性命即神氣神氣即性命但覺可聚而不可散可合而不可離或者指禪家為性宗指金丹為命宗性命本一強分為二惑矣但看紫陽悟真一書則知性命有不可偏廢之理其要只在採取真鉛真汞以為藥祖其非神氣也必矣妙用分明只在眉毛眼睫之邊人不知耳蟾光即是藥物西川乃金之本鄉藥物所産之地也近世李玉溪丹房致語最説得性命神氣之理的當學者其味之水鄉鉛只一味詩曰用鉛須用水鄉鉛只要身中藥物全流入黃房成至寶更須火候合周天真鉛一味結丹頭玉汞金砂莫外求若用其他形象物自然氣類不相投注曰一點先天真氣即真鉛也産於坎宫真水之中坎水鄉也而坎中一畫之陽真鉛是也蓋於坎中採取真鉛入於黃房之內鍊成還丹故曰金液大丹只此一味而已更無其他外求非類别物也若用丹砂水銀五金八石灰霜草滷之類則與天地相遼絶矣參同契云植禾當以黍覆雞用其卵燕雀不生鳳狐兔不乳馬水流不炎上火動不潤下欲作服食仙宜以同類者乃知水鄉一味真鉛只在一身之中初非求於一身之外也海蟾云鍊丹須用水鄉鉛只此一味乃還丹之根蒂也歸根竅復命關貫尾閭通泥丸混然子曰作丹妙用要明玄關一竅一性正位萬化歸根復命之道必由三關而轉故曰歸根竅復命關也當復命之時飛神海底存火薰蒸精化為氣撥動頂門關捩從尾閭徐徐提起直上泥丸交媾鍊氣化為神神居泥丸為本宫則有萬神朝會故曰貫尾閭通泥丸也大師汪真君奧旨云夾脊三關透頂門銜花騎鹿走如雲捉花騎鹿踏雲去霍地牛車前面迎黃庭經云子欲不死修崑崙還元篇云悟道顯然明廓落間間端坐運天關道德經云歸根曰靜靜曰復命其説是矣一壑居士曰作丹妙用全在玄關一竅而問何者為關何者為竅則無一人能明者此仙學之所以難也崔公直指關竅為二果有二乎太上云歸根曰靜靜曰復命歸根復命無二理則關竅亦無二矣又云谷神不死是謂玄牝玄牝之門是謂天地根人之一呼一吸呼接天根吸接地軸息息歸根為歸根而玄牝之門為歸根竅息息歸根氣入身來謂之生自能復命知歸根竅則知復命關矣蓋自發氣之源則曰竅自氣由此而升降則曰關自升氣上傳則曰玄關一竅非竅自竅關自關也關竅之路有二一由夾脊過雙關透頂門此督脈所行之路一由玉池過重樓入絳宫此任脈所行之路知此關竅則任督二脈河車之路可通當歸根復命之時飛神海底存火薰蒸鍊精化氣撥動頂門關捩子從尾閭徐徐提起直上泥丸而鍊氣化為神矣泥丸神之本宫神居泥丸則萬神朝會子欲不死修崑崙正此之謂也滄溟歸根竅復命關詩曰一竅之中兩竅存金丹還返是歸根其間空洞元無物虎髓龍精自吐吞修鍊須知復命關不知此竅亦如間大包天地無邊際細納乾坤黍米間注曰歸根竅復命關即天地根玄牝門也夫此一竅在人身中視之不見聽之不聞搏之不得恍恍惚惚窈窈冥冥至親至近動靜語默常與人俱而人自不知也此一竅實分二竅故曰玄又曰牝焉此乃人身中虛靈不昧之地先天聖父聖母之靈根繫焉蓋採先天一點真鉛實自此出鍊而成丹復歸在內故曰歸根竅復命關其中空洞無物可容但有真龍真虎自相吞吐真精於其內爾修鍊之士於此採先天造化之根以為藥祖鍊一粒黍米之寶以成還丹使之復歸其根即是返本還元之妙既歸其根則可復其命矣太上曰夫物藝藝各歸其根歸根曰靜貫尾閭通泥丸詩曰真氣周流貫尾閭曹溪何必用牛車三關直上皆通透不是旁門轉轆轤泥丸一竅達天門直上虛皇玉帝尊此是真人來往路時時跨鶴去朝元注曰此言人身中真氣周流下貫尾閭上通泥丸循環而轂轉也三宫升降上下往來無窮不息與造化同流轉此乃真鉛上升之景象既知此時便可採取過此以往藥物無用泥丸一穴即天門也黃庭經云天中之宅精謹修靈宅玉帝既清遊此言脫胎神化必自此竅而出入也真槖籥真鼎爐無中有有中無混然子曰槖者虛器也鞴也籥者其管也竅也言人夜一呼一吸之氣氣為之風如爐鞴之抽動風生於管爐火自炎久久心息相依丹田如常溫暖此吾身有真槖籥也道德經云天地之間其猶槖籥乎虛而不屈動而愈出是也鼎者乾也性也爐者坤也命也既鼓動吾身之槖籥必採藥物以入鼎採藥之時加火之功以性斡運於內以命施化於外片餉之間乾坤合一神氣交會結成還丹以為聖胎故曰真鼎爐也既得還丹成象以文火溫養虛心以守其性實腹以養其命恍惚窈冥之中無中生有有中生無此即靜極復動動極復靜故曰無中生有有中無也一壑居士曰無底曰槖槖者虛器也鞴也槖之管曰籥籥者行氣之具也竅也自天地論地為爐天為鼎自人身論腹為爐首為鼎自外丹論下為爐上為鼎自內丹論坎為爐離為鼎真鉛無體而水中生金無中有也真汞有形而見火則飛有中無也言人一呼一吸之氣息息歸根如爐鼎中鞴之抽動風生於管其火自炎丹田之中時常溫暖是為真槖籥真鼎爐有此真槖籥真鼎爐將見真鉛自無而成於有真汞自有而化於無以有制無以無制有而藥自生丹自結矣滄溟真槖籥真鼎爐詩曰玄牝之門自闔開須憑槖籥運風雷若將呼吸為關鍵怎得黃房結聖胎真鼎真爐內外通有根有蒂有無中須尋造化生成巧死戶生門總不同注曰槖籥陶鑄爐冶開闔風火之具也鼎爐修鍊金丹大藥之神室也人身之中豈有真橐籥鼎爐焉乃玄關一竅是也鉛汞之源造化之根玄牝之門盡在此矣橐則開而籥則闔譬之兒在母腹中隨母之氣母呼亦呼母吸亦吸分明如橐籥自然開闔也鼎爐有根有蒂無象無形不可以外求不可以內取須認得自然生成之巧則易於用力矣修鍊之要豈外乎此哉此言金液還丹在鼎爐之中自升自降上下往來隨玄牝之開闔如橐籥之運用自然成象矣又當知藥物根源在乎內安爐立鼎𨚫在外抽添運用在乎外玄珠成藥在乎內此處不可不參究也無中有有中無詩曰先天一氣本無虛採得來時結黍珠此是金丹玄妙處無中有有是真無大藥靈源妙更玄用之不見即先天有中無有為真有只是些兒汞與鉛注曰此言先天鉛汞之妙也大藥産於虛無空洞之中求其朕兆無有焉及其成丹則能飛騰變化而不可測即無中有有中無之妙則知無中有乃為真有有中無乃為真無紫陽云見之不可用用之不可見此皆造化至玄之理不可以言傳而可以心悟也託黃婆媒姹女輕輕地默默舉混然子曰黃婆姹女皆強名也黃婆者坤土也即戊已土也又言意也姹女兌金也兌為少女金隱水中凡作丹必託黃婆為媒通姹女之情以戊土藏火火逼金行當起火之初受氣且柔要當撥轉頂門關捩從尾閭穴輕輕地默默而舉須臾火力熾盛河車不可暫停運入南宫復還元位嫁與金公而作老郎崔公苦口叮嚀以謂世人不達還丹之旨故喻託以黃婆媒於姹女直欲世人曉此理也悟真篇云姹女遊行自有方前行須短後須長歸來卻入黃婆舍嫁箇金公作老郎是也一壑居士曰黃婆者坤土也土色黃坤為老陰故曰黃婆姹女者離宫地二火也離為中女乃宅中之女故曰姹女而嬰兒則坎中之一也姹女陽中之陰其性嘗戀嬰兒嬰兒陰中之陽其情嘗戀姹女為水火間隔不能相交惟坎水藏戊戊土化火得此戊土火逼金行嬰兒方能上升離宫又得離宫已土下行姹女與嬰兒相會結為夫婦同歸黃庭土釡之中而金丹結矣總之嬰兒者金也水也情也姹女者木也火也性也黃婆者戊也已也意也不過運吾之意使金之情歸木之性水之情歸火之性而已當起火之時受氣尚柔太急恐傷陽太緩恐傷陰只宜輕輕用意而不著意調息綿綿隨其上下往來默默而舉可也滄溟託黃婆媒姹女詩曰牛郎織女渡銀河間隔恩情歲月多夫婦欲期歡會處只須媒合託黃婆姹女妖嬈性最靈嬰兒二八正青春黃婆媒合為夫婦産出明珠無價珍注曰嬰兒居北騎白虎以東旋姹女處南駕青龍而西轉中被木金間隔兩情相慕不能自為聚會必託黃婆媒合始得男女同居陰陽相戀合成夫婦故得相生變化無窮黃婆即真土也以其色黃故名焉學者切不可泥此而妄自揣量向外求也言真鉛真汞上升之時必須用意以法採取而歸之黃房中至寶成矣輕輕地默默舉詩曰汞結鉛凝受氣初無為無作是功夫輕輕不可分毫力奪得驪龍頷下珠默默無為只守中周天火候合參同無為還自有為得舉動無非合聖功注曰此言得丹之後進退符火之妙法也以日論之朝屯暮蒙以終既未以月論之子復亥坤運用無窮周而復始及其抽添進退之時沐浴刑德之際雖鬼神不能測其機天地不能出其外也輕輕運動默默舉行自然成功無為無作動合天地之妙與其他旁門小法吐納存想之類大有徑庭矣一日內十二時意所到皆可為混然子曰意者性之用即真土也一日之內十二時辰有一年之節候自子時至辰已六時屬陽自午時至戊亥六時屬陰一陽來復身中子時也一陰生姤身中午時也且夫水火間於南北木金隔於東西此四象何由而合必假意以通消息是以天地造化一刻可奪一日之內十二時中無晝無夜念茲在茲常惺惺地動念以行火息念以溫養火此所以意所到皆可為也滄溟一日內十二時詩曰一日功夫一歲同晨昏符火定屯蒙須知更有時中妙不在全行百刻功一日平分十二時陰符陽火莫差池若能悟得時中刻片餉功夫立聖基注曰一日之內十二時辰自子至已為陽自午至亥為陰修鍊之妙攢一年造化於一日之內以十二月歸於十二辰之時分毫不差春夏秋冬二分二至無不共焉故曰年中取月不用年月中取日月徒然日中取時易日時中有刻而玄玄乃知採取只在片時玄妙無過半句此須盟授不可妄傳意所到皆可為詩曰此意分明即念頭念頭動處便堪修超凡入聖皆由我正是歸根復命秋人人有分無差别箇箇緣成總不殊若向此中能用意神仙都不擇賢愚注曰此言一日之內十二時中皆可修為也蓋一日之中自有一年之造化每日一陽初生之時皆可下手修鍊陽生非獨指子時也道光曰鍊藥不用尋冬至身中自有一陽生馬自然曰不刻時中分子午無爻卦內别乾坤此乃聖人盜天地奪造化至妙之機故陰符經云知之修鍊謂之聖人乃知子午乾坤周天火候皆在一日一時一刻之中故一年三百六十日計四千三百二十時除卯酉沐浴共七百二十時止有三千六百時乃所以應三百六十日則是簇三千六百之正氣應乾之策二百一十有六坤之策一百四十有四除牝牡四卦以為六十卦之作用故乾坤二卦之策合三千六百每一時凖二十銖為一兩之火一月除卯酉合七千二百銖一年合八萬六千四百銖凖二百二十五斤之火大而包之小而乘之則奪八十六萬四千之正氣計二千二百五十斤之火而大丹成矣然後換盡凡軀自然神化故能與三氣合德九氣齊并而與天地相為終始也乃知人人有分箇箇元成苟悟此機立躋聖地豈有賢愚間哉飮刀圭窺天巧辨朔望知昏曉混然子曰飮者宴也刀者水中金也圭者戊已真土也言作丹採藥之時必採水中之金金不得自升必假戊土化火逼逐金行度上泥丸金至此化為真液如瓊漿甘露落於黃庭宴之味之津液甘美故曰飲刀圭也窺者觀也言能觀天道運化之功遂執天而行旋吾身斗柄之機一刻之間能奪天地造化故曰窺天巧也陰符經所謂觀天之道執天之行盡矣純陽詩曰縱橫北斗心機大顚倒南辰膽氣雄是也辨朔望者以一歲言之冬至為朔夏至為望以一月言之初一為朔十五為望以一日言之子時為朔午時為望以一時言之初一刻為朔正一刻為望以六十四卦言之復卦為朔姤卦為望以一身言之尾穴為朔泥丸為望子宫進火為朔午位退符為望既明此理又要知其昏曉昏者暮也曉者朝也於卦有朝屯暮蒙之理一卦六爻顚到用之遂為兩卦朝屯一陽生於下暮蒙一陰生於上一陽一陰一進一退人身運化與天地同也達此理者可以長生久視與鍾吕並駕同日而語矣有何疑哉滄溟飲刀圭窺天巧詩曰一粒刀圭鍊入神大如黍米值千金只消半盞鴻濛酒飮處何須更鼓琴丹成金鼎燦雲霞不比丹砂長汞芽天巧豈容窺竅妙成功元不離黃家注曰刀圭即金丹也刀圭一粒大如黍米結於渾沌之中鴻濛之內火候既足玄珠成象於是鑿開渾沌擘裂鴻濛方見金丹無中生有之妙飮之入腹變化無方參同契云巨勝尚延年還丹可入口金性不敗朽故為萬物寶術士服食之夀命得長久土遊於四季完界守規矩金砂入五內霧散若風雨薰蒸達四肢顏色悅澤好髮白皆變黑齒落生舊所老翁復丁壯耆嫗成姹女攺形免世厄號之曰真人則知金液還丹不同凡藥苟不鑿開渾沌擘裂鴻濛則何以窺見天地之至寶無中生有之象哉紫陽云敲竹喚龜吞玉芝鼓琴招鳳飮刀圭近來透體金光現不與凡人話此規翠虛篇云更將一盞鴻濛酒餌此刀圭壯顏色則知服餌之深妙矣然天之所袐而非人莫泄也辨朔望知昏曉詩曰朔望功夫要辨明須防金水有危傾履霜必至堅水漸謹守新陽一脈生周天火候極玄微昏曉抽添要得知始起屯蒙終既未自然運轉合天時注曰辨朔望則知日月盈虧之妙知昏曉則知符火進退之時朔日月喪明望日月圓滿望後漸漸虧至晦則復滅矣朝屯暮蒙以迄既未周而復始循環無端此則周天火候之造化毫髮差殊不作丹矣識浮沈明主客要聚會莫間隔混然子曰浮者汞也沈者鉛也離汞居上曰浮坎鉛居下曰沈修丹之訣沈者必使其升浮者可使其降故曰識浮沈也既識浮沈須明主客主者命也客者性也有身則有命有命則有性性依命立命從性修是以命為性之母故為主性為命之子故為客日逐之間借身為用仙師所謂饒他為主我為賓是也既明主客以鉛汞而同爐主客而同室綿綿若存於二六時中回光返照打成一片遍滿太虛若夫時至氣化機動籟鳴火從臍下而發水向頂中而生其妙自有不期然而然者孔子所謂道也者不可須臾離也可離非道也程子亦云心常要在腔子裏虛靖天師曰神若出便收來神返身中氣自回如此朝朝還暮暮自然赤子産真胎此所以要聚會莫間隔也滄溟識浮沈明主客詩曰鍊丹須要識浮沈不識浮沈莫妄尋金水不調空著意汞飛鉛走謾勞心造化須明主共賓主賓定位別疏親後天造化無非客認得先天是主人注曰鉛沈汞浮故龍升虎降既識浮沈之理必明主客之機乃知先天為主後天為客也故紫陽云用將須分左右軍饒他為主我為賓勸君臨陳休輕敵恐喪吾家無價珍乃知修鍊不識浮沈不明主客則飛鉛走汞火燥水寒乖異浸生隆冬盛暑長夏霜雪風雨不節水旱相仍天見其怪山崩地裂嬰兒遠竄於殊方姹女逃亡於異域欲求還返其可得乎要聚會莫間隔詩曰離坎精神南會北虎龍魂魄合西東總歸戊已常相會盡在玄關一竅中水火差殊汞不乾木金間隔豈成丹這些玄妙蒙師指魂魄精神意一圑注曰金丹之道不過會五行八卦造化而成也東方青龍西方白虎南方朱雀北方玄武丙丁神火壬癸神水雖各處於一方皆欲歸於真土故常要聚會而不使之間隔也修煉之士能使金木水火土聚會一處精神魂魄意鍊作一圑則自然金木混融水火既濟而成功矣石杏林云意馬歸神室心猿守洞房精神魂魄意鍊作紫金霜而吕祖云辨朔望知水源清濁木金間隔不因師指此事難知方知神仙之言不為妄也採藥時調火功受氣吉防成凶混然子曰採藥時者乃身中一陽來復之時也於斯時則當閉關行火之功妙在調燮停勻從三關運轉一舉之時周流復位萬氣凝真當此之時獨受於我神之暢快喜慶難言故曰受氣吉也行火退符之間務在存誠一念不可間斷設或纖毫差失遂成凶矣密意防護不可不謹是用野戰防危故曰防成凶也丹經云配合虎龍交媾處此猶如過小橋時是也或曰性靜無為要坐便坐要眠便眠何必辨採藥調火蓋不知有造化者耳未足與議也滄溟採藥時調火功詩曰三五中秋月正圓便須急採癸生鉛此時自有先天藥只要知他望後前採得真鉛入鼎爐須調火候用功夫縱然有藥而無火怎得空懸一寶珠注曰採藥有時不得其時不可妄為也試觀天上之月至中秋而極盛大槩金旺在酉而金能生水故月圓而潮大也此天地造化至妙之處夫一身之中真氣有盛大之時與潮相似自湧泉而升泥丸周流六虛盤旋上下盎然如春不可以象喻人汨於事物之交接溺於嗜欲之昏昧不察至此雖時至亦不自知也苟知此時則玄關在此矣火候在此矣仍須用靜定功夫無中尋有以意採取之而入於黃房之中既得真鉛便須調停火候依時煆鍊不差時刻百日立基十月圓滿而金液還丹成矣但能觀月暈黑白測潮候消長即可會簇年月日時刻之妙也此乃修丹大要必假師傳倘或妄自揣量肆出胸臆則毫釐之差謬以千里紫陽云八月十五𣄹蟾輝正是金精壯盛時若到一陽才起處便宜進火莫延遲又云鉛遇癸生須急採金逢望遠不堪嘗不知其時則皆妄為耳受氣吉防成凶詩曰受氣之初本一同無非元吉在其中但能順受無從逆𥩟看丹砂滿鼎紅虎鬬龍爭禍易生防危有甚若防城須嚴守備令全密主將無為寢五兵注曰受氣即冬至下手採藥時也此言下手於一陽之時陽剛漸長元吉在其中矣倘能順受其正而無從逆之凶若此則丹砂成就而可以無虞矣紫陽云窮取生身受氣初是也防成凶即夏至一陰生之時陰氣漸長陽氣漸消然不可不謹愼以防丹砂有傾危之患即夏至守城是也故曰冬至野戰夏至守城而紫陽云日月三旬一遇逢以時易日法神功守城野戰知凶吉增得靈砂滿鼎紅又云受氣之初容易得抽添運用卻防危大抵是防陰氣太盛以傷丹也虎鬬龍爭危險莫大若不嚴加守備則反掌之間禍起蕭墻矣主將修丹鍊已之士也苟能掌握樞機則兵寢刑措而國富民安矣火候足莫傷丹天地靈造化慳混然子曰鍊得黃芽滿鼎白雪漫天嬰兒成象故火候足也火候既足只宜沐浴溫養若不知止足妄意行火反傷丹矣丹成之後天地混合神氣自靈仙師所謂虛室生白神明自來故曰天地靈也當此之時宜加寶愛調息務在微細於靜定之中內不出外不入形忘物忘心同太虛一氣純陽故造化慳也一壑居士曰鍊得黃芽滿鼎白雪瀰天嬰兒成象火候足也火候既足只宜沐浴溫養若不知止足妄意行火未免傷丹修鍊之士既得丹又不傷丹由是吾身一天地而天地無不靈矣吾身一造化而造化無不慳矣慳者吝也造化在我慳吝而不去也滄溟火候足莫傷丹詩曰周天火候起屯蒙輪厯周流既未終運用只消三百日自然黍米産中宫功夫十月足周天黍米縣空一顆圓丹熟不須行火候只宜默默養胎仙注曰周天火候十月功夫既以數足則大藥成象而不可再行符火倘不知止火之法則必至鉛飛汞走反傷丹體故紫陽云未鍊還丹須速鍊鍊了還須知止足若也持盈未巳心不免一朝遭殆辱又云丹熟不須行火候更行火候必傷丹以此見周天功夫造化之理盡於斯矣天地靈造化慳詩曰金丹大藥少人成天地須知此物靈縱使有緣能遇合奈何魔障半塗生學者紛紛滿市塵欲求達者更無人若知造化無慳惜四海應多吕洞賓注曰金液還丹天地至靈之寶故造化慳惜而不肯輕易與人世上學仙之士紛紛如牛毛而達者如麟角未之見也自非夙植善根三生緣幸縱使得遇勤修而魔障中生鬼神不許或有鼎器不完金液流蕩之患反傷其生矣當知天地至寶有緣之士須當露星盟天結歲寒福德之友以得其地然後依有力之人而共成之其或輕易自取禍殃故紫陽云命寶不宜輕弄又云動有羣魔作障緣其為警戒學者自當深切著明矣初結胎看本命終脫胎看四正混然子曰祖劫天根居渾沌之中乃為結胎之所下手之初鍊精化氣鍊氣化神鍊神還虛與道合真結為聖胎初結胎之時常於命門守之故曰初結胎看本命也十月胎圓移神上居泥丸調神出殼直待功成行滿上帝詔臨打破虛空真人上舉駕紅雲跨白鶴東西南北無所往而不可故曰終脫胎看四正靜中吟云一朝功滿人不知四面皆成夜光闕是也滄溟初結胎看本命詩曰採得先天一味鉛立基須要合黃玄聖胎結就無中有卻向蓬壺養一年修鍊還丹始立基先看本命後施為要知本命真消息只待陽生下手時注曰採一點先天之氣結九轉金液之丹凖天地之陰陽合人身之造化無中生有入聖超凡豈易事哉本命即丹基也丹基即下手也下手即受氣之初也既知採取凝結金丹之妙須當看丹基之初苟不洞曉陰陽深達造化不知本命妄自揣量則皆盲修瞎鍊而入旁門曲徑此中造化極其深遠難以言之當與得道之士耳提面命口傳而心受也終脫胎看四正詩曰十月功夫養就兒脫胎神化火龍飛頂門夜半雷聲響有箇真人朝太微木龍金虎剛柔正北坎南離造化微須看此中端的意更無人敢泄天機注曰海瓊白先生云此時丹熟要須慈母惜嬰兒不日雲飛方見真人朝上帝此言養就胎仙脫胎神化之妙金液還丹功夫十月按周天之火候如子母之誕生於虛無恍惚窈冥之中産就嬰兒則與我一體至此以待超凡入聖蛻骨沖舉轟雷霆開泥丸一竅之門駕雲霧朝自然三清之境必須看東西南北四正之宫乃嬰兒之神室也苟不先看四正則亦無以見中宫之中也造化玄微天機深遠輕慢泄漏殃及九祖此藍養素之所以養就嬰兒而猶待海蟾劉公一言之點化而後始脫胎也密密行句句應混然子曰此二句總結前八十句言金丹大道進火退符奪造化之妙訣行之一身如空谷之應聲陽燧之取火方諸之取水神通氣感何其速之如是故曰密密行句句應丹經云視之不見聽不聞及至呼時又却應是也一壑居士曰此二句總結前八十句既恐學者之疏漏而示以密密行之功又恐學者之有疑而示以句句應之效仙翁度人之意可謂深切而著明矣滄溟密密行句句應詩曰得道於身只自知靜中密密妙行持若教輕泄遭天譴平叔三傳禍即隨二百餘言簡且明明明如鏡似氷清若能依此行持法句句心傳谷裏聲注曰崔公入藥鏡一書首尾二百餘字真明鏡也諄諄所以教後學者深切著明矣如鑑形有鏡妍醜莫逃此書自採藥物於先天入鉛汞於神室行周天之火候成九轉之金液由初及終包括悉備而無餘藴矣修鍊之士苟能依其法度密密以行句句皆應如影隨形於日中如谷應聲於耳內皆不離一身之中譬之梓人執斤運斧自合凖繩學者悟之亦猶得之於心而應之於手矣附混然子挂金索一更端坐下手調元氣渾沌無言絶念存真意呼吸綿綿配合居中位撥轉些兒黍米藏天地二更清淨心要常虛守默默回光照見無中有趕退羣魔震地金獅吼頃刻功成便與天齊夀三更雞呌冬至陽初動取坎填離直向泥丸送火運周天爐內鉛投汞九轉丹成白雪飛仙洞四更安樂萬事都無想水滿華池澆灌靈根長靜裏乾坤仙樂頻頻響道大沖虛名挂黃金榜五更月落漸覺東方曉谷裏真人已見分明了玉戶鸞驂金鼎龍蟠繞打破虛空萬道金光皎百字令明三教之理儒宗聖人傳道執其中妙在惟精惟一放則周流彌六合卷則退藏於密格物致知正心誠意靜裏包皇極居仁由義應機不費毫力四時天地同參火符合候默默存真意三五歸元至德純保合太和沖溢體用一源顯微無間盡性窮端的死生勘破到頭還是空寂釋宗真宗頓悟理幽微了了無言可説曠劫至今全體具湛寂元無生滅拂麈拈花穿衣喫飯覿面分明泄頭頭皆是何須特地差别為言向上家風纖鋒快利透石剛如鐵三界圓通無所住隨處應機明徹芥納須彌珠含萬象朗耀懸秋月寸不挂即同諸佛齊列道宗修真立鼎鍊金丹只用三般靈藥冬至陽生忙下手採取也須斟酌抽坎填離流精進火正軸旋匡郭赤子乘龍一時騎上南嶽乾坤交媾歸來虎龍降伏夫婦同歡樂巽戶雙開大火然九轉丹凝磅礴玄谷風生性天雲散萬道神光爍功行完滿他年同駕鸞鶴
