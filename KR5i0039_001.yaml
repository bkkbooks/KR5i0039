body:
  text: 入藥鏡入藥鏡序余嘗謬意仙詮渺尋玄旨即僧燈道典咸置追繹顧生逾七十遍禮方流猶迷宗滯譬不識孔穴作料乃欲循之入室是御轅航海嗟嗟難哉年來俯仰大造吞吐六氣動靜忘境有無忘竅得從異人授以玄訣一掃侗蒙不落方位不經子午不入金石草木採戰諸旁惑竊復從事自謂至簡至易雖未可語太上無生之旨然久視門戶直趨堂奧將不遠矣暇日從篋中檢斯集謾讀之言解句訂渙然不逆若於前聞契焉遂欲託之以廣志士鳴呼虛無一氣升降浮沈天地日月且不能違而况於人奈之何俗夢易酣至言難悟易曰窮理盡性以至於命誠知聖言所在由之直養由之無害道其在茲乎濟南于鱗李攀龍序入藥鏡序神仙之學豈凡夫俗子之可聞必是大根大器決烈丈夫明眼高士之可為也且夫學者為者何事外則窮天地施化之理內則明身心運用之機然雖如是宣尼若不遇老子親授故無猶龍之歎瞿曇不是古聖再來豈有出世之見所以學者如牛毛達者如麟角此無他在乎得傳與不得傳耳神仙之學不過修煉性命返本還源而已採先天一氣以為丹母運後天之氣以行火候以火煉性則金神不壞以火煉命則道氣長存換盡陰濁之軀變成純陽之體神化自在應運無窮豈不奇哉余見今之學仙者紛紛之多及至與辨論真訣人各偏執一見不合先師正傳之道觀崔公入藥鏡八十二句言簡而意盡貫穿諸丹經之骨髓豫不愧管窺之見遂將吾師所授口訣每四句下添一注腳剖露玄機作人天眼目後之來者與我同志試留心玩誦斷斷有神告心悟之效無疑也或者有云吾注不足為信而崔公之言當以為實依而行之信而從之運煉一身則學仙之能事畢矣南昌修江混然子王道淵序
